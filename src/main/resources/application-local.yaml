spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/confluence_chatbot
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  ai:
    ollama:
      base-url: http://127.0.0.1:11434
      chat:
        options:
          model: qwen2.5:latest
      embedding:
        options:
          model: nomic-embed-text:latest

app:

  connector-default: REST
  chunking:
    lines-per-chunk: 30
    overlap-lines: 5
  ingestion:
    max-pages: 5000
    chunk-insert-batch-size: 100
  confluence:
    base-url: https://confluence.dev.mycompany.nl
    username: "sudha.mohan.panda@mycompany.nl"
    api-token: "your-api-token-here"
    space-key: FLA
  mcp:
    base-url: ""
    auth-token: ""
  keys:
    openai: <your-openai-api-key-here>
    anthropic: <your-anthropic-api-key-here>

